name: smart-glass-ci-cd-pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
  HARBOR_PROJECT: ${{ vars.HARBOR_PROJECT }}

jobs:
  # 1. 인증 서버(Spring Boot) 빌드 및 푸시
  build-auth-server:
    name: Build & Push Auth Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build application JAR
        working-directory: ./auth-server
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --no-daemon

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Auth Server
        uses: docker/build-push-action@v6
        with:
          context: ./auth-server
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/auth-server:${{ steps.meta.outputs.image_tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/auth-server:latest

  # 2. AI 서버(Python 등) 빌드 및 푸시
  build-ai-server:
    name: Build & Push AI Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AI Server
        uses: docker/build-push-action@v6
        with:
          context: ./ai-server
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/ai-server:${{ steps.meta.outputs.image_tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/ai-server:latest

  # 3. EKS 클러스터에 배포 (CD Pipeline 추가)
  deploy-to-eks:
    name: Deploy to EKS
    needs: [build-auth-server, build-ai-server] 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      # AWS 키가 GitHub Secrets에 있어야 작동
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # EKS skala-2025 출입증 발급
      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name skala-2025 --region ap-northeast-2

      # k8s 폴더 안 모든 yaml 파일을 쿠버네티스에 적용
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/