# DB 서버용 외장 하드
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sk007-db-pvc
  namespace: skala3-ai1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi   # DB는 용량 더 잡기

---
# AI 서버용 외장 하드
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sk007-ai-pvc
  namespace: skala3-ai1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi