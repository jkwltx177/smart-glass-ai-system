<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>로그인</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="container">
  <h1>로그인</h1>

  <!-- ✅ 폼은 유지하되, JS가 submit을 가로채서 fetch로 처리 -->
  <form id="loginForm" method="POST" action="/api/login">
    <label>아이디
      <input type="text" name="username" required autocomplete="username">
    </label>
    <label>비밀번호
      <input type="password" name="password" required autocomplete="current-password">
    </label>

    <button type="submit">로그인</button>
  </form>

  <p id="msg" style="color:#c00; margin-top:10px;"></p>

  <p>아직 계정이 없으신가요? <a href="/signup">회원가입</a></p>
</div>

<script>
(function () {
  const form = document.getElementById("loginForm");
  const msg = document.getElementById("msg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";

    const fd = new FormData(form);
    const body = new URLSearchParams();
    for (const [k, v] of fd.entries()) body.append(k, v);

    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
        credentials: "include",
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        msg.textContent = (data && data.error) ? data.error : ("로그인 오류 (HTTP " + res.status + ")");
        return;
      }

      // ✅ 성공 시 이동 (서버가 준 redirect 사용)
      const target = (data && data.redirect) ? data.redirect : "http://localhost:8008/index.html";
      window.location.href = target;
    } catch (err) {
      console.error(err);
      msg.textContent = "네트워크 오류로 로그인에 실패했습니다.";
    }
  });
})();
</script>

<!-- 기존 app.js가 redirect를 건드릴 수 있으니, 충돌 방지 위해 제거 권장 -->
<!-- <script src="/static/app.js"></script> -->
</body>
</html>
