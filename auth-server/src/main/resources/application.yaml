spring:
  application:
    name: auth-server

  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

jwt:
  # 32-byte Base64 encoded secret key
  secret: dGhpcy1pcy1hLWRlbW8tamR0LXNlY3JldC1rZXktZm9yLWRldi0wMDEyMw==
  expiration-ms: 3600000
