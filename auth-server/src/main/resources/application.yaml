spring:
  application:
    name: demo

  datasource:
    url: ${DB_URL:jdbc:mariadb://127.0.0.1:3380/smart_glass_dev}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USER:sg_app}
    password: ${DB_PASSWORD:sg_app_1}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  # 32-byte(이상) 키를 Base64 인코딩한 값
  secret: dGhpcy1pcy1hLWRlbW8tamR0LXNlY3JldC1rZXktZm9yLWRldi0wMDEyMw==
  expiration-ms: 3600000

auth:
  signup-verification-code: ${AUTH_SIGNUP_VERIFICATION_CODE:SG-DEMO-CODE-2026}
