version: '3.8'

services:
  project-db:
    image: mariadb:11.4
    container_name: smart-glass-project-db
    restart: unless-stopped
    ports:
      - "3380:3306"
    environment:
      - TZ=Asia/Seoul
      - MARIADB_ROOT_PASSWORD=mysql_1
      - MARIADB_DATABASE=smart_glass_dev
      - MARIADB_USER=sg_app
      - MARIADB_PASSWORD=sg_app_1
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --lower_case_table_names=1
    volumes:
      - project_db_data:/var/lib/mysql
      - ./infrastructure/mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./infrastructure/mariadb/project-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-pmysql_1"]
      interval: 10s
      timeout: 5s
      retries: 10
  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: smart-glass-ai-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-server/.env   # 환경변수 파일 연결
    depends_on:
      project-db:
        condition: service_healthy # DB가 정상 작동한 후 서버를 구동
    volumes:
      # 로컬 모델 가중치 및 저장소 연동
      - ./ai-server/models/weights:/app/models/weights
      - ./ai-server/storage:/app/storage

  # ! 인증 자바 서버까지 추가
  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    container_name: smart-glass-auth-server
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      project-db:
        condition: service_healthy

volumes:
  project_db_data: